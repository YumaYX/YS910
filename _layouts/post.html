---
layout: default
---

<article>
<h1>{{ page.title }}</h1>

{{ content }}

{% if page.previous.url %}
  <a class="prev" href="{{ site.baseurl }}{{page.previous.url}}">◀︎ {{page.previous.title}}</a>
{% endif %}

{% if page.previous.url and page.next.url %}|{% endif %}

{% if page.next.url %}
  <a class="next" href="{{ site.baseurl }}{{page.next.url}}">{{page.next.title}} ▶︎</a>
{% endif %}
</article>
